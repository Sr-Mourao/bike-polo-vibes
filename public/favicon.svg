<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Roda traseira -->
  <circle cx="25" cy="68" r="18" fill="none" stroke="#1a1a1a" stroke-width="5"/>
  <circle cx="25" cy="68" r="3" fill="#1a1a1a"/>
  <!-- Roda dianteira -->
  <circle cx="75" cy="68" r="18" fill="none" stroke="#1a1a1a" stroke-width="5"/>
  <circle cx="75" cy="68" r="3" fill="#1a1a1a"/>
  <!-- Quadro -->
  <polyline points="25,68 45,35 62,35 75,68" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linejoin="round"/>
  <line x1="45" y1="35" x2="25" y2="68" fill="none" stroke="#1a1a1a" stroke-width="5"/>
  <!-- Guidão -->
  <line x1="62" y1="35" x2="68" y2="22" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <line x1="63" y1="22" x2="75" y2="22" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <!-- Selim -->
  <line x1="44" y1="35" x2="44" y2="22" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <line x1="36" y1="22" x2="52" y2="22" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <!-- Pedal -->
  <circle cx="47" cy="55" r="4" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="40" y1="60" x2="54" y2="50" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
</svg>
